<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea il tuo Articolo</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <div class="form-container">
        <h1>Nuovo Articolo</h1>
        <input type="text" id="inputTitle" placeholder="Inserisci il titolo...">
        <textarea id="inputContent" placeholder="Inserisci il contenuto del paragrafo..." rows="5"></textarea>
        <button id="btnCreate">Crea Articolo</button>
    </div>

    <section id="articlesContainer">
        <h2>I tuoi Articoli</h2>
    </section>

    <script src="main1.js"></script>
</body>
</html>
