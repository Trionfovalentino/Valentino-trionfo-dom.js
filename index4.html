<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presto.it | Personalizzato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style4.css">
</head>
<body class="bg-light">

    <section class="container my-4 p-4 bg-white shadow-sm rounded">
    <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label">Cerca per nome</label>
            <input type="text" id="filterName" class="form-control" placeholder="Es: Huawei...">
        </div>
        <div class="col-md-4">
            <label class="form-label">Categoria</label>
            <select id="filterCategory" class="form-select">
                <option value="All">Tutte le categorie</option>
                </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Prezzo massimo: <span id="priceValue">55000</span> €</label>
            <input type="range" id="filterPrice" class="form-range" min="0" max="55000" step="10">
        </div>
    </div>
</section>

    <section class="container my-5 p-4 bg-white shadow rounded">
        <h2 class="text-center mb-4">Offerte in Scadenza!</h2>
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <input type="number" id="secondsInput" class="form-control mb-3" placeholder="Imposta secondi countdown">
                <div id="timerDisplay" class="display-1 fw-bold text-primary mb-3">0</div>
                <div class="btn-group w-100">
                    <button id="startBtn" class="btn btn-success">Avvia</button>
                    <button id="pauseBtn" class="btn btn-warning">Pausa</button>
                    <button id="resetBtn" class="btn btn-danger">Reset</button>
                </div>
            </div>
        </div>
    </section>

    <section class="container my-5">
        <h2 class="mb-4">I nostri Annunci</h2>
        <div id="announcementsWrapper" class="row g-4">
            </div>
    </section>

    <script src="main4.js"></script>
</body>
</html>
