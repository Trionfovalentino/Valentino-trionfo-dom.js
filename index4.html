<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presto.it | Il tuo Usato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style4.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">PRESTO.IT</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Annunci</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-lg-3" href="#">Vendi</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="bg-white py-5 shadow-sm mb-5">
        <div class="container text-center">
            <h1 class="display-4">Offerte Lampo</h1>
            <p class="lead">Sbrigati! Gli sconti scadono tra:</p>
            <div id="timerDisplay" class="display-1 fw-bold">0</div>
            
            <div class="mt-4 d-flex justify-content-center gap-2">
                <input type="number" id="secondsInput" class="form-control w-25" placeholder="Secondi...">
                <button id="startBtn" class="btn btn-success">Avvia</button>
                <button id="pauseBtn" class="btn btn-warning">Pausa</button>
                <button id="resetBtn" class="btn btn-danger">Reset</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="row">
            <aside class="col-lg-3 mb-4">
                <div class="filter-card shadow-sm p-4 sticky-top" style="top: 20px;">
                    <h4 class="mb-4 text-primary">Filtra Ricerca</h4>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Cerca Nome</label>
                        <input type="text" id="filterName" class="form-control" placeholder="Cosa cerchi?">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Categoria</label>
                        <select id="filterCategory" class="form-select">
                            <option value="All">Tutte le categorie</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Prezzo Max: <span id="priceValue">0</span>€</label>
                        <input type="range" id="filterPrice" class="form-range" min="0" step="1">
                    </div>
                </div>
            </aside>

            <section class="col-lg-9">
                <div id="announcementsWrapper" class="row g-4">
                    </div>
            </section>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2024 Presto.it - Esercitazione Aulab</p>
    </footer>

    <script src="main4.js"></script>
</body>
</html>
